<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta - NexPath</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <section class="hero form-page form-page--compact">
      <h1 class="fade-in-1">
        Criar conta no <span class="nexpath-brand">NexPath</span>
      </h1>

      <form
        class="card register-card fade-in-2"
        id="registerForm"
        onsubmit="return validarRegistro();"
      >
        <input
          id="nome"
          name="nome"
          type="text"
          placeholder="Nome completo"
          required
          oninvalid="this.setCustomValidity('Por favor, preencha o nome.')"
          oninput="validarNomeInput(this)"
        />

        <input
          id="usuario"
          name="usuario"
          type="text"
          placeholder="Nome de usuário"
          required
          oninvalid="
            this.setCustomValidity('Por favor, escolha um nome de usuário.')
          "
          oninput="
            this.setCustomValidity('');
            validarUsuarioInput(this);
          "
        />
        <span class="field-hint"
          >Apenas letras, números e _ (sem espaços ou símbolos)</span
        >

        <input
          id="email"
          name="email"
          type="email"
          placeholder="Email"
          required
          oninvalid="this.setCustomValidity('Por favor, preencha o email.')"
          oninput="this.setCustomValidity('')"
        />

        <div class="phone-row">
          <select class="ddd-select" id="dddPais" name="dddPais">
            <option value="+55">🇧🇷 +55</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+351">🇵🇹 +351</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+34">🇪🇸 +34</option>
            <option value="+33">🇫🇷 +33</option>
            <option value="+49">🇩🇪 +49</option>
            <option value="+39">🇮🇹 +39</option>
            <option value="+81">🇯🇵 +81</option>
            <option value="+86">🇨🇳 +86</option>
            <option value="+91">🇮🇳 +91</option>
            <option value="+54">🇦🇷 +54</option>
            <option value="+56">🇨🇱 +56</option>
            <option value="+57">🇨🇴 +57</option>
            <option value="+52">🇲🇽 +52</option>
          </select>
          <input
            class="phone-input"
            id="telefone"
            name="telefone"
            type="tel"
            placeholder="DDD + número (ex: 11991234567)"
            inputmode="numeric"
            oninput="this.value = this.value.replace(/\D/g, '')"
            maxlength="11"
            required
            oninvalid="this.setCustomValidity('Por favor, informe o telefone.')"
          />
        </div>

        <input
          id="senha"
          name="senha"
          type="password"
          placeholder="Senha"
          minlength="8"
          required
          oninvalid="
            this.setCustomValidity(
              'A senha precisa ter no mínimo 8 caracteres.',
            )
          "
          oninput="this.setCustomValidity('')"
        />
        <span class="field-hint"
          >Mínimo 8 caracteres, uma maiúscula, um número e um símbolo</span
        >

        <input
          id="confirmarSenha"
          name="confirmarSenha"
          type="password"
          placeholder="Confirmar senha"
          required
          oninvalid="this.setCustomValidity('Por favor, confirme a senha.')"
          oninput="this.setCustomValidity('')"
        />

        <label class="birth-label" for="nascimento">Data de nascimento</label>
        <input
          id="nascimento"
          name="nascimento"
          type="date"
          required
          oninvalid="
            this.setCustomValidity('Por favor, informe a data de nascimento.')
          "
          oninput="this.setCustomValidity('')"
        />

        <div class="terms">
          <input
            type="checkbox"
            id="terms"
            name="terms"
            required
            oninvalid="
              this.setCustomValidity('Você precisa aceitar os termos de uso.')
            "
            oninput="this.setCustomValidity('')"
          />
          <label for="terms">
            Eu aceito os
            <span class="terms-link" onclick="abrirTermos()"
              >Termos de Uso</span
            >
          </label>
        </div>

        <button class="btn" type="submit">Criar conta</button>

        <p class="login-link">
          Já possui conta?<a href="login.html"> Entrar</a>
        </p>
      </form>
    </section>

    <div id="popup-termos" class="popup">
      <div class="popup-content">
        <h2>Termos de Uso</h2>
        <p>
          Aqui você poderá colocar todos os termos do NexPath. Explique uso de
          dados financeiros, privacidade, segurança etc.
        </p>
        <button onclick="fecharTermos()" class="btn">Fechar</button>
      </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
