<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - NexPath</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <section class="hero form-page">
      <h1 class="fade-in-1">
        Entrar no <span class="nexpath-brand">NexPath</span>
      </h1>

      <form class="card login-card fade-in-2" id="loginForm">
        <input
          id="loginIdentificador"
          name="loginIdentificador"
          type="text"
          placeholder="Email ou nome de usuário"
          required
          oninvalid="
            this.setCustomValidity(
              'Por favor, preencha seu email ou nome de usuário.',
            )
          "
          oninput="this.setCustomValidity('')"
        />

        <input
          id="loginSenha"
          name="loginSenha"
          type="password"
          placeholder="Senha"
          minlength="8"
          required
          oninvalid="
            this.setCustomValidity(
              'A senha precisa ter no mínimo 8 caracteres.',
            )
          "
          oninput="this.setCustomValidity('')"
        />

        <button class="btn" type="submit">Entrar</button>

        <p class="forgot-link">
          <a href="forgot-password.html">Esqueceu a senha?</a>
        </p>

        <p class="register-link">
          Não tem conta? <a href="register.html">Criar Conta</a>
        </p>

        <hr />

        <p class="social-text">Ou continue com</p>

        <div class="social-login">
          <button class="social-btn" type="button">
            <img src="../icons/Google.svg" alt="Google" />
            Entrar com Google
          </button>
          <button class="social-btn" type="button">
            <img src="../icons/Microsoft.svg" alt="Microsoft" />
            Entrar com Microsoft
          </button>
          <button class="social-btn" type="button">
            <img src="../icons/Github.svg" alt="GitHub" />
            Entrar com GitHub
          </button>
        </div>
      </form>
    </section>

    <!-- Popup estilizado de notificações -->
    <div id="nexpath-popup" class="nexpath-popup">
      <div class="nexpath-popup-content">
        <span class="nexpath-popup-icon" id="popup-icon">⚠️</span>
        <p id="popup-mensagem"></p>
        <button class="btn" onclick="fecharPopup()">OK</button>
      </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
