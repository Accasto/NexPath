<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - NexPath</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>

  <body>
    <header>
      <div class="logo">NexPath</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="#">Dashboard</a>
        <a href="#" id="nav-usuario" class="nav-usuario-label"></a>
        <a href="#" onclick="logout()" class="nav-btn-outline">Sair</a>
      </nav>
    </header>

    <section class="hero">
      <h1 class="fade-in-1">
        Dashboard — <span class="nexpath-brand">NexPath</span>
      </h1>
      <p class="fade-in-2">
        Em breve: suas finanças, hábitos e relatórios em um só lugar.
      </p>
    </section>

    <section class="container fade-in-3">
      <div class="card">
        <h2>Saldo Atual</h2>
        <p
          style="
            font-size: 28px;
            color: var(--cyan-neon);
            font-weight: 700;
            margin: 16px 0;
          "
        >
          R$ 0,00
        </p>
        <p>Suas transações aparecerão aqui em breve.</p>
      </div>

      <div class="card">
        <h2>Últimas Transações</h2>
        <p>
          Nenhuma transação ainda.<br />
          O histórico aparecerá aqui após a integração completa.
        </p>
      </div>
    </section>

    <script src="../js/script.js"></script>
    <script>
      (function () {
        const token = sessionStorage.getItem("nexpath_token");
        const usuario = sessionStorage.getItem("nexpath_usuario");

        if (!token || !usuario) {
          window.location.href = "login.html";
          return;
        }

        const el = document.getElementById("nav-usuario");
        if (el) el.textContent = "@" + usuario;
      })();

      function logout() {
        sessionStorage.removeItem("nexpath_token");
        sessionStorage.removeItem("nexpath_usuario");
        sessionStorage.removeItem("nexpath_nome");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
