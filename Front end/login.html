<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - FinanCeeIA</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="hero">
      <h1>Entrar no FinanCeeIA</h1>

      <form
        class="card login-card"
        id="loginForm"
        onsubmit="return validarLogin();"
      >
        <input
          id="loginEmail"
          name="loginEmail"
          type="email"
          placeholder="Email"
          required
        />

        <input
          id="loginSenha"
          name="loginSenha"
          type="password"
          placeholder="Senha"
          required
        />

        <button class="btn" type="submit">Entrar</button>

        <p class="register-link">
          Não tem conta? <a href="register.html">Criar Conta</a>
        </p>

        <hr />

        <p class="social-text">Ou continue com</p>

        <div class="social-login">
          <button class="social-btn">
            <img src="icons/Google.svg" alt="Google" />

            Entrar com Google
          </button>

          <button class="social-btn">
            <img src="icons/Microsoft.svg" alt="Microsoft" />

            Entrar com Microsoft
          </button>

          <button class="social-btn">
            <img src="icons/Github.svg" alt="GitHub" />

            Entrar com GitHub
          </button>
        </div>
      </form>
    </section>

    <script src="script.js"></script>
  </body>
</html>
