<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - FinanCeeIA</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="hero">
      <h1>Entrar no FinanCeeIA</h1>

      <div class="card login-card">
        <input type="email" placeholder="Email" required />

        <input type="password" placeholder="Senha" required />

        <button class="btn" onclick="return validarLogin();">Entrar</button>

        <p class="register-link">
          Não tem conta? <a href="register.html">Criar Conta</a>
        </p>

        <hr />

        <p class="social-text">Ou continue com</p>

        <div class="social-login">
          <button class="social-btn">
            <img src="icons/Google.svg" alt="Google" />

            Entrar com Google
          </button>

          <button class="social-btn">
            <img src="icons/Microsoft.svg" alt="Microsoft" />

            Entrar com Microsoft
          </button>

          <button class="social-btn">
            <img src="icons/Github.svg" alt="GitHub" />

            Entrar com GitHub
          </button>
        </div>
      </div>
    </section>

    <!-- inputs de login -->

    <input type="email" id="loginEmail" placeholder="Email" />

    <input type="password" id="loginSenha" placeholder="Senha" />
  </body>
</html>
