<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar conta - FinanCeeIA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<h1>Criar conta no FinanCeeIA</h1>

<div class="card register-card">

<input type="text" placeholder="Nome completo" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Senha" required>

<input type="password" placeholder="Confirmar senha" required>

<label class="birth-label">Data de nascimento</label>

<input type="date" required>

<div class="terms">

<input type="checkbox" id="terms">

<label for="terms">
Eu aceito os <span class="terms-link" onclick="abrirTermos()">Termos de Uso</span>
</label>

</div>

<button class="btn" onclick="return validarRegistro()">Criar conta</button>

<p class="login-link">Já possui conta?<a href="login.html"> Entrar</a></p>

</div>

</section>

<div id="popup-termos" class="popup">

<div class="popup-content">

<h2>Termos de Uso</h2>

<p>
Aqui você poderá colocar todos os termos do FinanCeeIA.
Explique uso de dados financeiros, privacidade, segurança etc.
</p>

<button onclick="fecharTermos()" class="btn">Fechar</button>

<script src="script.js"></script>

</div>

</div>

</body>

</html>
