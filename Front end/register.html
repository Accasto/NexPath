<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Criar conta - FinanCeeIA</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="hero">
      <h1>Criar conta no FinanCeeIA</h1>

      <form
        class="card register-card"
        id="registerForm"
        onsubmit="return validarRegistro();"
      >
        <input
          id="nome"
          name="nome"
          type="text"
          placeholder="Nome completo"
          required
          oninvalid="this.setCustomValidity('Por favor, preencha o nome.')"
          oninput="this.setCustomValidity('')"
        />

        <input
          id="email"
          name="email"
          type="email"
          placeholder="Email"
          required
          oninvalid="this.setCustomValidity('Por favor, preencha o email.')"
          oninput="this.setCustomValidity('')"
        />

        <input
          id="senha"
          name="senha"
          type="password"
          placeholder="Senha"
          required
          oninvalid="this.setCustomValidity('Por favor, preencha a senha.')"
          oninput="this.setCustomValidity('')"
        />

        <input
          id="confirmarSenha"
          name="confirmarSenha"
          type="password"
          placeholder="Confirmar senha"
          required
          oninvalid="this.setCustomValidity('Por favor, confirme a senha.')"
          oninput="this.setCustomValidity('')"
        />

        <label class="birth-label" for="nascimento">Data de nascimento</label>

        <input
          id="nascimento"
          name="nascimento"
          type="date"
          required
          oninvalid="
            this.setCustomValidity('Por favor, informe a data de nascimento.')
          "
          oninput="this.setCustomValidity('')"
        />

        <div class="terms">
          <input
            type="checkbox"
            id="terms"
            name="terms"
            required
            oninvalid="
              this.setCustomValidity('Você precisa aceitar os termos de uso.')
            "
            oninput="this.setCustomValidity('')"
          />

          <label for="terms">
            Eu aceito os
            <span class="terms-link" onclick="abrirTermos()"
              >Termos de Uso</span
            >
          </label>
        </div>

        <button class="btn" type="submit">Criar conta</button>

        <p class="login-link">
          Já possui conta?<a href="login.html"> Entrar</a>
        </p>
      </form>
    </section>

    <div id="popup-termos" class="popup">
      <div class="popup-content">
        <h2>Termos de Uso</h2>

        <p>
          Aqui você poderá colocar todos os termos do FinanCeeIA. Explique uso
          de dados financeiros, privacidade, segurança etc.
        </p>

        <button onclick="fecharTermos()" class="btn">Fechar</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
