<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar senha - NexPath</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="hero" style="padding-top: 80px">
      <h1 class="fade-in-1" style="font-size: 36px">Recuperar senha</h1>

      <div class="card recovery-card fade-in-2">
        <p class="desc">Escolha como deseja recuperar sua conta:</p>

        <div class="recovery-tabs">
          <button class="tab-btn active" onclick="trocarAba('email')">
            📧 Email
          </button>
          <button class="tab-btn" onclick="trocarAba('usuario')">
            👤 Nome de usuário
          </button>
          <button class="tab-btn" onclick="trocarAba('telefone')">
            📱 Telefone
          </button>
        </div>

        <!-- Email -->
        <div class="recovery-section active" id="section-email">
          <input type="email" id="recEmail" placeholder="Digite seu email" />
          <button class="btn" onclick="recuperarPor('email')">
            Enviar link de recuperação
          </button>
        </div>

        <!-- Nome de usuário -->
        <div class="recovery-section" id="section-usuario">
          <input
            type="text"
            id="recUsuario"
            placeholder="Digite seu nome de usuário"
          />
          <button class="btn" onclick="recuperarPor('usuario')">
            Buscar meu email
          </button>
        </div>

        <!-- Telefone -->
        <div class="recovery-section" id="section-telefone">
          <div class="phone-row">
            <select class="ddd-select" id="recDDD">
              <option value="+55">🇧🇷 +55</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+351">🇵🇹 +351</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+34">🇪🇸 +34</option>
              <option value="+33">🇫🇷 +33</option>
              <option value="+49">🇩🇪 +49</option>
              <option value="+39">🇮🇹 +39</option>
              <option value="+81">🇯🇵 +81</option>
              <option value="+86">🇨🇳 +86</option>
              <option value="+91">🇮🇳 +91</option>
              <option value="+54">🇦🇷 +54</option>
              <option value="+56">🇨🇱 +56</option>
              <option value="+57">🇨🇴 +57</option>
              <option value="+52">🇲🇽 +52</option>
            </select>
            <input
              class="phone-input"
              type="tel"
              id="recTelefone"
              placeholder="Número de telefone"
              inputmode="numeric"
              oninput="this.value = this.value.replace(/\D/g, '')"
            />
          </div>
          <button class="btn" onclick="recuperarPor('telefone')">
            Enviar SMS de recuperação
          </button>
        </div>

        <div class="success-msg" id="successMsg"></div>

        <p class="back-link">
          <a href="login.html">← Voltar para login</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
    <script src="forgot-password.js"></script>
  </body>
</html>
