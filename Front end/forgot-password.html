<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar senha - NexPath</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .recovery-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #334155;
      }

      .tab-btn {
        flex: 1;
        padding: 10px 6px;
        background: #0f172a;
        color: #94a3b8;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: 0.2s;
        border-radius: 0;
        margin: 0;
      }

      .tab-btn.active {
        background: #22c55e;
        color: white;
      }

      .tab-btn:hover:not(.active) {
        background: #1e293b;
        color: white;
      }

      .recovery-section {
        display: none;
        flex-direction: column;
        gap: 12px;
      }

      .recovery-section.active {
        display: flex;
      }

      .phone-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .ddd-select {
        width: 130px;
        flex-shrink: 0;
        padding: 12px 8px;
        margin-top: 0;
        border-radius: 8px;
        border: none;
        background: #0f172a;
        color: white;
        font-size: 13px;
        cursor: pointer;
      }

      .ddd-select option {
        background: #0f172a;
      }

      .phone-input {
        flex: 1;
        margin-top: 0;
      }

      .recovery-card {
        max-width: 420px;
        margin: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .recovery-card p.desc {
        font-size: 14px;
        color: #94a3b8;
        margin: 0 0 8px 0;
      }

      .back-link {
        text-align: center;
        margin-top: 8px;
        font-size: 14px;
      }

      .back-link a {
        color: #22c55e;
        text-decoration: none;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      .success-msg {
        display: none;
        background: #14532d;
        border: 1px solid #22c55e;
        color: #bbf7d0;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <section class="hero">
      <h1>Recuperar senha</h1>

      <div class="card recovery-card">
        <p class="desc">Escolha como deseja recuperar sua conta:</p>

        <div class="recovery-tabs">
          <button class="tab-btn active" onclick="trocarAba('email')">
            📧 Email
          </button>
          <button class="tab-btn" onclick="trocarAba('usuario')">
            👤 Nome de usuário
          </button>
          <button class="tab-btn" onclick="trocarAba('telefone')">
            📱 Telefone
          </button>
        </div>

        <!-- Email -->
        <div class="recovery-section active" id="section-email">
          <input type="email" id="recEmail" placeholder="Digite seu email" />
          <button class="btn" onclick="recuperarPor('email')">
            Enviar link de recuperação
          </button>
        </div>

        <!-- Nome de usuário -->
        <div class="recovery-section" id="section-usuario">
          <input
            type="text"
            id="recUsuario"
            placeholder="Digite seu nome de usuário"
          />
          <button class="btn" onclick="recuperarPor('usuario')">
            Buscar meu email
          </button>
        </div>

        <!-- Telefone -->
        <div class="recovery-section" id="section-telefone">
          <div class="phone-row">
            <select class="ddd-select" id="recDDD">
              <option value="+55">🇧🇷 +55</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+351">🇵🇹 +351</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+34">🇪🇸 +34</option>
              <option value="+33">🇫🇷 +33</option>
              <option value="+49">🇩🇪 +49</option>
              <option value="+39">🇮🇹 +39</option>
              <option value="+81">🇯🇵 +81</option>
              <option value="+86">🇨🇳 +86</option>
              <option value="+91">🇮🇳 +91</option>
              <option value="+54">🇦🇷 +54</option>
              <option value="+56">🇨🇱 +56</option>
              <option value="+57">🇨🇴 +57</option>
              <option value="+52">🇲🇽 +52</option>
            </select>
            <input
              class="phone-input"
              type="tel"
              id="recTelefone"
              placeholder="Número de telefone"
              inputmode="numeric"
              oninput="this.value = this.value.replace(/\D/g, '')"
            />
          </div>
          <button class="btn" onclick="recuperarPor('telefone')">
            Enviar SMS de recuperação
          </button>
        </div>

        <div class="success-msg" id="successMsg"></div>

        <p class="back-link">
          <a href="login.html">← Voltar para login</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
    <script>
      function trocarAba(aba) {
        document.querySelectorAll(".tab-btn").forEach((btn, i) => {
          btn.classList.remove("active");
        });
        document.querySelectorAll(".recovery-section").forEach((sec) => {
          sec.classList.remove("active");
        });

        const abas = ["email", "usuario", "telefone"];
        const idx = abas.indexOf(aba);
        document.querySelectorAll(".tab-btn")[idx].classList.add("active");
        document.getElementById("section-" + aba).classList.add("active");

        document.getElementById("successMsg").style.display = "none";
      }

      function recuperarPor(metodo) {
        const msg = document.getElementById("successMsg");
        msg.style.display = "none";

        if (metodo === "email") {
          const email = document.getElementById("recEmail").value.trim();
          if (!email || !email.includes("@")) {
            alert("Digite um email válido.");
            return;
          }
          // TODO: checar no banco de dados se email existe
          // Por ora, simula com localStorage
          const usuarios = JSON.parse(
            localStorage.getItem("nexpath_usuarios") || "[]",
          );
          const encontrado = usuarios.find((u) => u.email === email);
          if (encontrado) {
            msg.textContent = "✅ Link de recuperação enviado para " + email;
          } else {
            msg.textContent =
              "❌ Email não encontrado. Verifique e tente novamente.";
          }
          msg.style.display = "block";
        } else if (metodo === "usuario") {
          const usuario = document.getElementById("recUsuario").value.trim();
          if (!usuario) {
            alert("Digite seu nome de usuário.");
            return;
          }
          // TODO: buscar email pelo username no banco de dados
          const usuarios = JSON.parse(
            localStorage.getItem("nexpath_usuarios") || "[]",
          );
          const encontrado = usuarios.find(
            (u) => u.usuario === usuario.toLowerCase(),
          );
          if (encontrado) {
            const emailOculto = ocultarEmail(encontrado.email);
            msg.textContent =
              '✅ O email associado a "@' + usuario + '" é: ' + emailOculto;
          } else {
            msg.textContent = "❌ Usuário não encontrado.";
          }
          msg.style.display = "block";
        } else if (metodo === "telefone") {
          const ddd = document.getElementById("recDDD").value;
          const tel = document.getElementById("recTelefone").value.trim();
          if (!tel || tel.length < 8) {
            alert("Digite um número de telefone válido.");
            return;
          }
          // TODO: integrar com SMS (ex: Twilio) e buscar no banco de dados
          msg.textContent =
            "✅ SMS de recuperação enviado para " + ddd + " " + tel;
          msg.style.display = "block";
        }
      }

      function ocultarEmail(email) {
        const [user, domain] = email.split("@");
        const oculto = user.substring(0, 2) + "***";
        return oculto + "@" + domain;
      }
    </script>
  </body>
</html>
